        <h1>Get In Touch</h1>
        <form id="contact-form" style="max-width: 600px; margin-top: 30px;">
            <label for="name">Name</label><br>
            <input type="text" id="name" required style="width:100%; padding:10px; margin-bottom:20px;"><br>

            <input type="email" id="email" required style="width:100%; padding:10px; margin-bottom:20px;"><br>
            
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>
